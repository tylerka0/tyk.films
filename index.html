<script>
    gsap.registerPlugin(ScrollTrigger);

    let tl = gsap.timeline({
        scrollTrigger: {
            trigger: "#main-sequence",
            start: "top top",
            end: "+=250%", 
            pin: true,
            scrub: 1,
        }
    });

    // 1. Text slides out faster
    tl.to(".left-t", { xPercent: -150, opacity: 0 }, 0)
      .to(".right-t", { xPercent: 150, opacity: 0 }, 0)

    // 2. Video zooms out to fill the screen width comfortably
    // We use 100vw and 100vh to make it "Fit the page"
      .to(".video-window", { 
        width: "100vw", 
        height: "100vh", 
        margin: "0",
        borderRadius: "0px",
        duration: 2,
        ease: "none"
      }, 0);

    // 3. Reveal next section
    tl.to(".hero-panel", { yPercent: -100, duration: 1 });
</script>
