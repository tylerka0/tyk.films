<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYK.FILMS | VISUAL ARCHIVE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

    <nav>
        <div class="logo">TYK.FILMS</div>
        <div class="nav-btns">
            <a href="#work" class="btn">WORK</a>
            <a href="#about" class="btn">ABOUT</a>
            <a href="#contact" class="btn">CONTACT</a>
        </div>
    </nav>

    <div id="main-sequence">
        <section class="panel hero-panel">
            <div class="hero-content">
                <div class="text-wrap left-t"><h1>WHERE<br>VISION</h1></div>
                
                <div class="video-window">
                    <video autoplay muted loop playsinline>
                        <source src="your-video.mp4" type="video/mp4">
                    </video>
                </div>

                <div class="text-wrap right-t"><h1>MEETS<br>EXECUTION</h1></div>
            </div>
        </section>

        <section class="panel desc-panel">
            <div class="desc-content">
                <div class="box">
                    <p>WE CRAFT DIGITAL EXPERIENCES AND IDENTITIES THAT DON'T JUST LOOK BEAUTIFUL.</p>
                </div>
                <div class="box border-l">
                    <p>THEY PERFORM. FROM STRATEGY TO EXECUTION, WE BLEND CREATIVITY AND PRECISION.</p>
                </div>
            </div>
        </section>
    </div>

    <section class="gallery-grid" id="work">
        <div class="item tall"><img src="photo1.jpg"></div>
        <div class="item"><img src="photo2.jpg"></div>
        <div class="item wide"><img src="photo3.jpg"></div>
        <div class="item"><img src="photo4.jpg"></div>
        <div class="item tall"><img src="photo5.jpg"></div>
        <div class="item"><img src="photo6.jpg"></div>
        <div class="item"><img src="photo7.jpg"></div>
        <div class="item wide"><img src="photo8.jpg"></div>
        <div class="item"><img src="photo9.jpg"></div>
        <div class="item"><img src="photo10.jpg"></div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        let tl = gsap.timeline({
            scrollTrigger: {
                trigger: "#main-sequence",
                start: "top top",
                end: "+=250%", 
                pin: true,
                scrub: 1,
            }
        });

        // The exact "Aurevia" sequence: 
        // 1. Text moves out. 
        // 2. Video zooms but stops at a clean "Hero" size (90% width).
        tl.to(".left-t", { xPercent: -150, opacity: 0 }, 0)
          .to(".right-t", { xPercent: 150, opacity: 0 }, 0)
          .to(".video-window", { 
            width: "90vw", 
            height: "85vh", 
            duration: 2,
            ease: "power2.inOut"
          }, 0);

        // 3. Slide the whole panel up to reveal the text boxes
        tl.to(".hero-panel", { yPercent: -100, duration: 1, ease: "power2.inOut" });
    </script>
</body>
</html>
