<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYK.FILMS | VISUAL ARCHIVE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">TYK.FILMS</div>
        <div class="nav-links">
            <a href="#">WORK</a>
            <a href="#">ABOUT</a>
            <a href="#">CONTACT</a>
        </div>
    </nav>

    <section class="hero-split">
        <div class="hero-text left reveal">
            <h1>WHERE<br>VISION</h1>
        </div>
        
        <div class="hero-video-container reveal">
            <video autoplay muted loop playsinline>
                <source src="your-video.mp4" type="video/mp4">
            </video>
        </div>

        <div class="hero-text right reveal">
            <h1>MEETS<br>EXECUTION</h1>
        </div>
    </section>

    <section class="description-bar">
        <div class="desc-left reveal">
            <p>WE CRAFT DIGITAL EXPERIENCES AND VISUAL IDENTITIES THAT DON'T JUST LOOK BEAUTIFUL. THEY PERFORM.</p>
        </div>
        <div class="desc-right reveal">
            <p>FROM STRATEGY TO EXECUTION, WE BLEND CREATIVITY AND PRECISION TO HELP AMBITIOUS BRANDS GROW.</p>
        </div>
    </section>

    <section class="image-grid">
        <div class="grid-item tall reveal"><img src="photo1.jpg" alt=""></div>
        <div class="grid-item reveal"><img src="photo2.jpg" alt=""></div>
        <div class="grid-item wide reveal"><img src="photo3.jpg" alt=""></div>
        <div class="grid-item reveal"><img src="photo4.jpg" alt=""></div>
        <div class="grid-item reveal"><img src="photo5.jpg" alt=""></div>
        <div class="grid-item tall reveal"><img src="photo6.jpg" alt=""></div>
        <div class="grid-item reveal"><img src="photo7.jpg" alt=""></div>
        <div class="grid-item wide reveal"><img src="photo8.jpg" alt=""></div>
        <div class="grid-item reveal"><img src="photo9.jpg" alt=""></div>
        <div class="grid-item reveal"><img src="photo10.jpg" alt=""></div>
    </section>

    <footer class="reveal">
        <h2>LET'S CREATE SOMETHING EXCEPTIONAL</h2>
        <button class="cta-btn">START YOUR PROJECT →</button>
    </footer>

    <script>
        // ANIMATION SCRIPT: Makes elements fade in as you scroll
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>

</body>
</html>
