<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYK.FILMS | ARCHIVE</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="https://www.instagram.com/tyk.films/" target="_blank" class="logo">TYK.FILMS</a>
        <div class="nav-btns">
            <a href="#work" class="btn">WORK</a>
            <a href="#about" class="btn">ABOUT</a>
            <a href="#contact" class="btn">CONTACT</a>
        </div>
    </nav>

    <div id="main-sequence">
        <section class="panel hero-panel">
            <div class="hero-content">
                <div class="text-wrap left-t"><h1>WHERE<br>VISION</h1></div>
                
                <div class="video-window">
                    <video autoplay muted loop playsinline>
                        <source src="your-video.mp4" type="video/mp4">
                    </video>
                </div>

                <div class="text-wrap right-t"><h1>MEETS<br>EXECUTION</h1></div>
            </div>
        </section>

        <section class="panel desc-panel" id="about">
            <div class="desc-content">
                <div class="box"><p>WE CRAFT DIGITAL EXPERIENCES AND IDENTITIES THAT DON'T JUST LOOK BEAUTIFUL.</p></div>
                <div class="box border-l"><p>THEY PERFORM. FROM STRATEGY TO EXECUTION, WE BLEND CREATIVITY AND PRECISION.</p></div>
            </div>
        </section>
    </div>

    <section class="gallery-grid" id="work">
        <div class="item tall"><img src="photo1.jpg"></div>
        <div class="item"><img src="photo2.jpg"></div>
        <div class="item wide"><img src="photo3.jpg"></div>
        <div class="item wide"><img src="photo4.jpg"></div> <div class="item tall"><img src="photo5.jpg"></div>
        <div class="item wide"><img src="photo6.jpg"></div> </section>

    <footer id="contact">
        <h2>LET'S WORK.</h2>
        <div class="footer-links">
            <a href="mailto:twkao@ucdavis.edu" class="btn">twkao@ucdavis.edu</a>
            <a href="https://www.instagram.com/tyk.films/" target="_blank" class="btn">INSTAGRAM</a>
        </div>
    </footer>

    <script>
        window.addEventListener("load", function() {
            if (window.gsap) {
                gsap.registerPlugin(ScrollTrigger);

                let tl = gsap.timeline({
                    scrollTrigger: {
                        trigger: "#main-sequence",
                        start: "top top",
                        end: "+=250%", 
                        pin: true,
                        scrub: 1,
                        anticipatePin: 1,
                        invalidateOnRefresh: true
                    }
                });

                tl.to(".left-t", { xPercent: -150, opacity: 0 }, 0)
                  .to(".right-t", { xPercent: 150, opacity: 0 }, 0)
                  .to(".video-window", { 
                    width: "90vw",     // Limits width to 90% of screen
                    height: "50.6vw",  // Keeps 16:9 ratio
                    maxWidth: "1200px", // Hard cap on expansion size
                    maxHeight: "675px", // Hard cap on expansion height
                    margin: "0",
                    duration: 2,
                    ease: "power2.inOut"
                  }, 0)
                  .to(".hero-panel", { yPercent: -100, duration: 1 });

                ScrollTrigger.refresh();
            }
        });
    </script>
</body>
</html>
