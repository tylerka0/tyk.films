<script>
    gsap.registerPlugin(ScrollTrigger);

    // This ensures everything is loaded before measuring the page
    window.addEventListener("load", function() {
        
        // Initial state for the horizontal sliver
        gsap.set(".video-window", { 
            width: "450px", 
            height: "80px",
            opacity: 1 
        });

        let tl = gsap.timeline({
            scrollTrigger: {
                trigger: "#main-sequence",
                start: "top top",
                end: "+=250%",
                pin: true,
                scrub: 1,
                anticipatePin: 1,
                invalidateOnRefresh: true // Recalculates if window changes
            }
        });

        tl.to(".left-t", { xPercent: -150, opacity: 0 }, 0)
          .to(".right-t", { xPercent: 150, opacity: 0 }, 0)
          .to(".video-window", {
              width: "100vw",
              height: "56.25vw", // Perfect 16:9 ratio
              margin: "0",
              duration: 2,
              ease: "power2.inOut"
          }, 0)
          .to(".hero-panel", { yPercent: -100, duration: 1 });

        // THE MAGIC FIX: This forces the browser to "see" the scroll positions 
        // without needing to open the inspector.
        ScrollTrigger.refresh();
    });
</script>
